<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Photo Booth</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="back-gradient centered"></div> <!-- Background gradient -->

    <div class="flex-column gap-100 centered width-100">

        <!-- Title -->
        <div class="flex-column">
            <div style="width: 175px; height: 175px; display: flex; align-items: center; justify-content: center;">
                <img src="assets/logo/logo.png" alt="Photo Booth Logo" class="logo">
            </div>
            <h3 class="semi-bold">Bringing the precision of the web to the fun of the booth</h3>
            <h4 class="regular">We design the experience; you define the moment. EasyWeb makes it effortless.</h4>
        </div>

        <!-- Start Button -->
        <button class="primary-button" onclick="window.location.href='booth.html'">
            <img src="assets/icons/camera.png" alt="" class="icon">
            Start
        </button>
    </div>


</body>

</html>
